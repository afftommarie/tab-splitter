<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tab Splitter — Tests</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.10);
    --text: #1a1916;
    --muted: #6b6a66;
    --green: #1e5e3a;
    --green-bg: #d4edda;
    --red: #7a2020;
    --red-bg: #fde8e8;
    --amber: #7a4f00;
    --amber-bg: #fff3cd;
    --mono: 'Courier New', monospace;
    --font: system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16150f;
      --surface: #1e1d16;
      --border: rgba(255,255,255,0.09);
      --text: #f0efe8;
      --muted: #9a9990;
      --green: #74c69d;
      --green-bg: #1a3a26;
      --red: #e07070;
      --red-bg: #3a1a1a;
      --amber: #f0c040;
      --amber-bg: #3a2e00;
    }
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); padding: 24px 20px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .summary-bar {
    display: flex; gap: 16px; padding: 12px 16px;
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 10px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .stat { font-size: 13px; }
  .stat strong { font-weight: 600; }
  .stat--pass strong { color: var(--green); }
  .stat--fail strong { color: var(--red); }
  .stat--skip strong { color: var(--amber); }

  .suite { margin-bottom: 20px; }
  .suite-title {
    font-size: 14px; font-weight: 600; padding: 8px 0 6px;
    border-bottom: 0.5px solid var(--border); margin-bottom: 8px;
    letter-spacing: -0.1px;
  }
  .test-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 5px 6px; border-radius: 6px; font-size: 13px;
    line-height: 1.5;
  }
  .test-row--pass { color: var(--text); }
  .test-row--fail { background: var(--red-bg); color: var(--red); border-radius: 6px; }
  .test-row--error { background: var(--amber-bg); color: var(--amber); border-radius: 6px; }
  .badge {
    flex-shrink: 0; font-size: 11px; font-weight: 600; padding: 1px 7px;
    border-radius: 99px; font-family: var(--mono);
  }
  .badge--pass { background: var(--green-bg); color: var(--green); }
  .badge--fail { background: var(--red-bg); color: var(--red); }
  .badge--error { background: var(--amber-bg); color: var(--amber); }
  .err-detail { font-family: var(--mono); font-size: 11px; margin-top: 2px; opacity: 0.85; }

  .loading { color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<h1>Tab Splitter Tests</h1>
<p class="subtitle">Open in any browser. No build step required.</p>
<div id="summary-bar" class="summary-bar"><span class="loading">Running tests…</span></div>
<div id="results"></div>

<script type="module">
// ─── Minimal test harness ─────────────────────────────────────────────

const allResults = []; // { suite, name, status, error? }

class SuiteContext {
  constructor(suiteName) {
    this.name    = suiteName;
    this._before = null;
  }
  before(fn) { this._before = fn; }
  test(name, fn) {
    if (this._before) { try { this._before(); } catch(e) { /* ignore */ } }
    try {
      fn();
      allResults.push({ suite: this.name, name, status: 'pass' });
    } catch (e) {
      allResults.push({ suite: this.name, name, status: 'fail', error: e });
    }
  }
  eq(a, b) {
    if (a !== b) throw new Error(`Expected ${JSON.stringify(a)} to equal ${JSON.stringify(b)}`);
  }
  deepEq(a, b) {
    if (JSON.stringify(a) !== JSON.stringify(b)) {
      throw new Error(`Expected ${JSON.stringify(a)} to deep-equal ${JSON.stringify(b)}`);
    }
  }
  truthy(v) {
    if (!v) throw new Error(`Expected truthy value, got ${JSON.stringify(v)}`);
  }
  throws(fn, errorClass) {
    let threw = false;
    try { fn(); } catch(e) {
      threw = true;
      if (errorClass && !(e instanceof errorClass)) {
        throw new Error(`Expected ${errorClass.name} but got ${e.constructor.name}: ${e.message}`);
      }
    }
    if (!threw) throw new Error('Expected function to throw but it did not');
  }
}

function suite(name, fn) {
  const ctx = new SuiteContext(name);
  try { fn(ctx); } catch(e) {
    allResults.push({ suite: name, name: '(suite setup)', status: 'error', error: e });
  }
}

// ─── Load and run tests ───────────────────────────────────────────────

async function runAll() {
  const modules = [
    import('./calculator.test.js'),
    import('./taxLookup.test.js')
  ];

  const loaded = await Promise.allSettled(modules);
  const files = ['calculator.test.js', 'taxLookup.test.js'];

  loaded.forEach((result, i) => {
    if (result.status === 'rejected') {
      allResults.push({
        suite: files[i],
        name: '(module load)',
        status: 'error',
        error: result.reason
      });
    } else {
      result.value.default(suite);
    }
  });

  render();
}

// ─── Render results ───────────────────────────────────────────────────

function render() {
  const pass  = allResults.filter(r => r.status === 'pass').length;
  const fail  = allResults.filter(r => r.status === 'fail').length;
  const error = allResults.filter(r => r.status === 'error').length;
  const total = allResults.length;

  // Summary bar
  const bar = document.getElementById('summary-bar');
  bar.innerHTML = `
    <span class="stat stat--pass"><strong>${pass}</strong> passed</span>
    <span class="stat stat--fail"><strong>${fail}</strong> failed</span>
    ${error ? `<span class="stat stat--skip"><strong>${error}</strong> errors</span>` : ''}
    <span class="stat"><strong>${total}</strong> total</span>
  `;

  // Group by suite
  const bySuite = {};
  allResults.forEach(r => {
    if (!bySuite[r.suite]) bySuite[r.suite] = [];
    bySuite[r.suite].push(r);
  });

  const out = document.getElementById('results');
  out.innerHTML = '';

  for (const [suiteName, tests] of Object.entries(bySuite)) {
    const suiteEl = document.createElement('div');
    suiteEl.className = 'suite';
    const passCount = tests.filter(t => t.status === 'pass').length;
    suiteEl.innerHTML = `<div class="suite-title">${esc(suiteName)} <span style="font-weight:400;color:var(--muted)">(${passCount}/${tests.length})</span></div>`;

    tests.forEach(r => {
      const row = document.createElement('div');
      row.className = `test-row test-row--${r.status === 'error' ? 'error' : r.status}`;
      const badge = `<span class="badge badge--${r.status === 'error' ? 'error' : r.status}">${r.status.toUpperCase()}</span>`;
      const errDetail = r.error
        ? `<div class="err-detail">${esc(r.error.message || String(r.error))}</div>`
        : '';
      row.innerHTML = `${badge}<div><div>${esc(r.name)}</div>${errDetail}</div>`;
      suiteEl.appendChild(row);
    });

    out.appendChild(suiteEl);
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

runAll().catch(e => {
  document.getElementById('summary-bar').innerHTML = `<span style="color:var(--red)">Test runner error: ${e.message}</span>`;
});
</script>
</body>
</html>
